
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style/style.css">
  <title>Planète Flora - formulaire maladies admin</title>

</head>

<body>

<!-- MALADIES -->
<section class="dashboard">

  <div class="dashboard-title">
    <h2>🦠 Ajouter une maladie</h2>
  </div>

  <div class="dashboard-card">

    <form id="diseaseForm">

      <input
        type="text"
        placeholder="Nom maladie"
      >

      <textarea
        placeholder="Symptômes"
      ></textarea>

      <textarea
        placeholder="Traitement"
      ></textarea>

      <label for="severity">Gravité</label>
      <select id="severity">

        <option>
          Faible
        </option>

        <option>
          Moyen
        </option>

        <option>
          Élevé
        </option>

      </select>

      <button class="btn" type="submit">
        Ajouter
      </button>

    </form>

  </div>

</section>
</body>
</html>

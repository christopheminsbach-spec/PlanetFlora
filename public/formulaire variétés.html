

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style/style.css">
  <title>Planète Flora - formulaire variétés admin</title>

</head>

<body>

<!-- VARIETES -->
<section class="dashboard">

  <div class="dashboard-title">
    <h2>🌱 Ajouter une variété</h2>
  </div>

  <div class="dashboard-card">

    <form id="varietyForm">

      <input
        type="text"
        placeholder="Nom variété"
      >

      <input
        type="text"
        placeholder="Couleur"
      >

      <input
        type="text"
        placeholder="Période floraison"
      >

      <textarea
        placeholder="Caractéristiques"
      ></textarea>

      <button class="btn">
        Ajouter variété
      </button>

    </form>

  </div>

</section>
</body>
</html>

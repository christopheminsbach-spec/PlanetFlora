<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planet Flora</title>

<link rel="stylesheet" href="style/style.css">
</head>

<body>

<div class="container">

    <!-- ================= LOGIN ================= -->
    <div class="card" id="loginView">
        <h2>🔐 Connexion</h2>

        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Mot de passe">

        <button id="loginBtn">Se connecter</button>

        <p class="switch" id="goRegister">
            Pas de compte ? S'inscrire
        </p>
    </div>

    <!-- ================= REGISTER ================= -->
    <div class="card hidden" id="registerView">
        <h2>📝 Inscription</h2>

        <input type="text" id="registerUsername" placeholder="Username">
        <input type="email" id="registerEmail" placeholder="Email">
        <input type="password" id="registerPassword" placeholder="Mot de passe">

        <button id="registerBtn">Créer un compte</button>

        <p class="switch" id="goLogin">
            Déjà un compte ? Se connecter
        </p>
    </div>

    <!-- ================= APP ================= -->
    <div class="card">
    <h2>🌿 Plant AI</h2>

    <p class="subtitle">
        Identifiez vos plantes grâce à l'IA
    </p>

    <!-- ZONE UPLOAD (remplace input file) -->
    <div id="uploadBox" class="upload-box">
        <p>📷 Cliquez ici pour choisir une image</p>
        <small>ou déposer une image</small>
    </div>

    <!-- input caché -->
    <input type="file" id="img" accept="image/*" hidden>

    <img id="preview" alt="preview">

    <h3 id="result">Résultat...</h3>
    <div id="conf"></div>
</div>

<script src="app.js"></script>
</body>
</html>
